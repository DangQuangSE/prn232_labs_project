version: '3.8'

services:
  lms-db:
    image: postgres:alpine
    container_name: lms_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lmsdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lms-network

  lms-api:
    image: lms-api
    build:
      context: .
      dockerfile: PRN232.LMSSystem.API/Dockerfile
    container_name: lms_web_api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=lms-db;Port=5432;Database=lmsdb;Username=postgres;Password=postgres
    depends_on:
      - lms-db
    networks:
      - lms-network

volumes:
  pgdata:

networks:
  lms-network:
    driver: bridge
